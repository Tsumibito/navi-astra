  document.addEventListener('DOMContentLoaded', function() {
    const supportedLanguages = ['RU', 'EN', 'UA'];
    const currentUrl = window.location.href;
    const url = new URL(currentUrl);
    const pathSegments = url.pathname.split('/').filter(segment => segment !== '');

    const getCurrentLanguage = () => {
      if (pathSegments.length === 0) {
        return 'RU';
      }
      const firstSegment = pathSegments[0].toUpperCase();
      if (supportedLanguages.includes(firstSegment)) {
        return firstSegment;
      }
      return 'RU';
    };

    const currentLanguage = getCurrentLanguage();
    const langContainer = document.getElementById('Lang_cnt');
    const activeLangBox = document.getElementById('Lang-box-aktive');
    const langMenu = document.getElementById('lang-menu');

    // Скрываем контейнер сразу
    langContainer.style.display = 'none';

    const updateLanguageUI = () => {
      const activeLangText = activeLangBox.querySelector('.w-text');
      activeLangText.textContent = currentLanguage;
      supportedLanguages.forEach(lang => {
        if (lang === currentLanguage) {
          const langBox = document.getElementById(`Lang-box-${lang}`);
          if (langBox) {
            langBox.style.display = 'none';
          }
        }
      });
    };

    updateLanguageUI();

    const style = document.createElement('style');
    style.textContent = `
      #lang-menu {
        display: none;
        flex-direction: column;
        opacity: 0;
        transform: translateY(-10px);
        transition: opacity 0.3s ease, transform 0.3s ease;
        position: absolute;
        background-color: #ffffff;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-top: 5px;
        z-index: 1000;
      }
      #lang-menu.show {
        display: flex;
        opacity: 1;
        transform: translateY(0);
      }
      #lang-menu div {
        cursor: pointer;
      }
    `;
    document.head.appendChild(style);

    let hideTimeout = null;
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    const showMenu = (openType) => {
      langMenu.classList.add('show');
      if (hideTimeout) {
        clearTimeout(hideTimeout);
        hideTimeout = null;
      }
      if (openType === 'click') {
        hideTimeout = setTimeout(() => {
          langMenu.classList.remove('show');
        }, 2000);
      }
    };

    const hideMenuFunc = () => {
      hideTimeout = setTimeout(() => {
        langMenu.classList.remove('show');
      }, isMobile ? 2000 : 500);
    };

    activeLangBox.addEventListener('mouseenter', () => {
      showMenu('hover');
    });

    activeLangBox.addEventListener('click', () => {
      showMenu('click');
    });

    activeLangBox.addEventListener('touchstart', () => {
      showMenu('click');
    });

    langContainer.addEventListener('mouseleave', () => {
      hideMenuFunc();
    });

    langMenu.addEventListener('mouseleave', () => {
      hideMenuFunc();
    });

    langMenu.addEventListener('mouseenter', () => {
      if (hideTimeout) {
        clearTimeout(hideTimeout);
        hideTimeout = null;
      }
    });

    langMenu.addEventListener('click', function(event) {
      const clickedElement = event.target.closest('[id^="Lang-box-"]');
      if (clickedElement) {
        const langTextElement = clickedElement.querySelector('.w-text');
        if (langTextElement) {
          const selectedLang = langTextElement.textContent.trim().toUpperCase();
          redirectToLanguage(selectedLang);
        }
      }
    });

    const redirectToLanguage = (lang) => {
      let newPathSegments = [...pathSegments];
      if (newPathSegments.length === 0) {
        newPathSegments = [lang.toLowerCase(), 'home'];
      } else {
        const firstSegment = newPathSegments[0].toUpperCase();
        if (supportedLanguages.includes(firstSegment)) {
          newPathSegments[0] = lang.toLowerCase();
        } else {
          newPathSegments.unshift(lang.toLowerCase());
        }
      }
      url.pathname = '/' + newPathSegments.join('/') + '/';
      window.location.href = url.toString();
    };

    document.addEventListener('click', function(event) {
      if (!langContainer.contains(event.target)) {
        langMenu.classList.remove('show');
        if (hideTimeout) {
          clearTimeout(hideTimeout);
          hideTimeout = null;
        }
      }
    });

    // Показываем контейнер после обновления UI
    langContainer.style.display = 'block';
  });
